// protos/fx_service.proto
syntax = "proto3";

package fx;

service FXService {
  rpc GetExchangeRate (ExchangeRateRequest) returns (ExchangeRateResponse);
  rpc GetMultipleRates (MultipleRatesRequest) returns (MultipleRatesResponse);
}

// Este es para hacer un único cambio como GTQ a USD
message ExchangeRateRequest {
  string from_currency = 1;  // Ej: "GTQ"
  string to_currency = 2;    // Ej: "USD"
}

// Esta es la salida esperada, 
message ExchangeRateResponse {
  string from_currency = 1; // De donde viene
  string to_currency = 2;   // A cual se quiere cambiar
  double rate = 3;          
  int64 timestamp = 4;      // La fecha
  bool from_cache = 5;      // Si viene de la caché
  bool is_fallback = 6;     // Si vino del fallback por error
}

message MultipleRatesRequest {
  string base_currency = 1;  // Ej: "GTQ"
  repeated string target_currencies = 2;  // ["USD", "EUR", "MXN"]
}

message MultipleRatesResponse {
  string base_currency = 1;
  map<string, double> rates = 2;  // {"USD": 0.128, "EUR": 0.118}
  int64 timestamp = 3;
  bool from_cache = 4;
}