
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: economarket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - economarket-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  fx-service:
    build:
      dockerfile: Dockerfile
    container_name: economarket-fx-service
    ports:
      - "5001:5000"  # Flask
      - "50052:50052"  # gRPC
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_PORT=50052
      - FLASK_PORT=5000
      - LOG_LEVEL=INFO
      - FX_API_BASE_URL=https://open.er-api.com/v6/latest
      - FX_API_TIMEOUT=10
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - economarket-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  economarket-network:
    driver: bridge