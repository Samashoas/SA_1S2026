name: Build and Push Docker Images

on:
  push:
    branches:
      - 'release/v*'
      - 'feature/terraform'

jobs:
  extract-version:
    runs-on: self-hosted
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH_NAME=${{ github.ref }}
          if [[ "$BRANCH_NAME" == "refs/heads/release/v"* ]]; then
            VERSION=${BRANCH_NAME#refs/heads/release/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and run tests - cart-checkout-service
        working-directory: ./services/cart-checkout-service
        run: |
          npm ci
          npm test -- --passWithNoTests

  terraform-syntax:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: set up terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Validate Terraform syntax
        working-directory: ./terraform
        run: terraform init -backend=false && terraform validate
  
  contracts:
    runs-on: ubuntu-latest
    needs: terraform-syntax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install OpenAPI validation tools
        run: |
          npm install -g @stoplight/spectral-cli
          npm install -g swagger-cli

      - name: Validate OpenAPI contract syntax
        run: |
          swagger-cli validate ./contractos/openApi/openapi.yaml

      - name: Generate contract validation report
        if: always()
        run: |
          echo "Contract validation completed"
          echo "OpenAPI file location: ./contractos/openApi/openapi.yaml"

  build-and-push:
    needs: [extract-version, contracts, terraform-syntax]
    runs-on: self-hosted
    strategy:
      matrix:
        service:
          - name: api-gateway
            path: services/api-gateway
          - name: user-auth-service
            path: services/user-auth-service
          - name: cart-checkout-service
            path: services/cart-checkout-service
          - name: catalogo-service
            path: services/catalogo-service
          - name: fx-service
            path: services/fx-service
          - name: integrations-service
            path: services/integrations-service
          - name: order-service
            path: services/orders-service
          - name: wallet-service
            path: services/payments-wallet-service
          - name: notification-service
            path: services/notificaciones-service
          - name: coupons-service
            path: services/coupons-service
          - name: frontend
            path: frontend
          - name: locust
            path: locust
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up Docker images and dangling resources
        run: |
          echo "Cleaning up dangling Docker images and containers..."
          sudo docker image prune -a --force
          sudo docker container prune --force
          sudo docker system prune --force --volumes
          echo "Docker cleanup completed"

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          sudo docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-g10-${{ matrix.service.name }}:${{ needs.extract-version.outputs.version }} ./${{ matrix.service.path }}
          sudo docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-g10-${{ matrix.service.name }}:latest ./${{ matrix.service.path }}
          sudo docker push ${{ secrets.DOCKER_USERNAME }}/docker-g10-${{ matrix.service.name }}:${{ needs.extract-version.outputs.version }}
          sudo docker push ${{ secrets.DOCKER_USERNAME }}/docker-g10-${{ matrix.service.name }}:latest

  notify:
    needs: [extract-version, build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: preventive-cleanup
        run: |
          echo "Starting preventive cleanup of Docker resources..."
          sudo docker image prune -a --force || echo "No images to prune"
          sudo docker image prune -a -f --volumes || echo "No volumes to prune"
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo journalctl --vacuum-time=3d
          echo "Preventive cleanup completed."
      - name: Notify build status
        run: |
          echo "Build completed for version: ${{ needs.extract-version.outputs.version }}"
          echo "All Docker images have been pushed to Docker Hub"
          echo "Images tagged as:"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-api-gateway:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-user-auth-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-cart-checkout-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-catalogo-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-fx-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-integrations-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-order-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-wallet-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-coupons-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-notification-service:${{ needs.extract-version.outputs.version }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/docker-g10-frontend:${{ needs.extract-version.outputs.version }}"

  k8sapply:
    needs: [notify, extract-version]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud and verify cluster access
        run: |
          echo "Authenticating to GCP..."
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          
          echo "Getting GKE cluster credentials..."
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --region=${{ secrets.GKE_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}
          
          echo "Verifying cluster access..."
          kubectl cluster-info
      
      - name: Update services manifest with version
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          echo "Updating user-auth-service.yml with version: $VERSION"
          
          sed -i "s|image: samashoas/docker-g10-user-auth-service:__version__|image: samashoas/docker-g10-user-auth-service:$VERSION|g" k8s/user-auth-service.yml
          sed -i "s|image: samashoas/docker-g10-notification-service:__version__|image: samashoas/docker-g10-notification-service:$VERSION|g" k8s/notifications-service.yml
          sed -i "s|image: samashoas/docker-g10-fx-service:__version__|image: samashoas/docker-g10-fx-service:$VERSION|g" k8s/fx-service.yml
          sed -i "s|image: samashoas/docker-g10-catalogo-service:__version__|image: samashoas/docker-g10-catalogo-service:$VERSION|g" k8s/catalog-service.yml
          sed -i "s|image: samashoas/docker-g10-order-service:__version__|image: samashoas/docker-g10-order-service:$VERSION|g" k8s/orders-service.yml
          sed -i "s|image: samashoas/docker-g10-cart-checkout-service:__version__|image: samashoas/docker-g10-cart-checkout-service:$VERSION|g" k8s/cart-service.yml
          sed -i "s|image: samashoas/docker-g10-wallet-service:__version__|image: samashoas/docker-g10-wallet-service:$VERSION|g" k8s/wallet-service.yml
          sed -i "s|image: samashoas/docker-g10-integrations-service:__version__|image: samashoas/docker-g10-integrations-service:$VERSION|g" k8s/integration-service.yml
          sed -i "s|image: samashoas/docker-g10-coupons-service:__version__|image: samashoas/docker-g10-coupons-service:$VERSION|g" k8s/coupons-service.yml
          sed -i "s|image: samashoas/docker-g10-api-gateway:__version__|image: samashoas/docker-g10-api-gateway:$VERSION|g" k8s/api-gateway.yml
          sed -i "s|image: samashoas/docker-g10-frontend:__version__|image: samashoas/docker-g10-frontend:$VERSION|g" k8s/frontend.yml

          echo "Updated manifest:"
          grep "image:" k8s/user-auth-service.yml
          grep "image:" k8s/notifications-service.yml
          grep "image:" k8s/fx-service.yml
          grep "image:" k8s/catalog-service.yml
          grep "image:" k8s/orders-service.yml
          grep "image:" k8s/cart-service.yml
          grep "image:" k8s/wallet-service.yml
          grep "image:" k8s/integration-service.yml
          grep "image:" k8s/coupons-service.yml
          grep "image:" k8s/api-gateway.yml
          grep "image:" k8s/frontend.yml

      - name: Apply services to Kubernetes
        run: |
          echo "Applying user-auth-service.yml to cluster..."
          kubectl apply -f k8s/user-auth-service.yml
          kubectl apply -f k8s/notifications-service.yml
          kubectl apply -f k8s/catalog-service.yml
          kubectl apply -f k8s/orders-service.yml
          kubectl apply -f k8s/redis.yml
          kubectl apply -f k8s/fx-service.yml
          kubectl apply -f k8s/cart-service.yml
          kubectl apply -f k8s/wallet-service.yml
          kubectl apply -f k8s/integration-service.yml
          kubectl apply -f k8s/coupons-service.yml
          kubectl apply -f k8s/api-gateway.yml
          kubectl apply -f k8s/frontend.yml
          kubectl apply -f k8s/ingress.yml
          
      - name: Verify deployment
        run: |
          echo "Waiting for user-auth-service deployment to be ready..."
          kubectl rollout status deployment/user-auth-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=user-auth-service

          kubectl rollout status deployment/notification-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=notification-service

          kubectl rollout status deployment/catalogo-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=catalogo-service

          kubectl rollout status deployment/orders-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=orders-service

          kubectl rollout status deployment/cart-checkout-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=cart-checkout-service

          kubectl get statefulset redis -n g10
          kubectl get pods -n g10 -l app=redis

          kubectl rollout status deployment/fx-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=fx-service

          kubectl rollout status deployment/wallet-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=wallet-service

          kubectl rollout status deployment/integrations-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=integrations-service

          kubectl rollout status deployment/coupons-service -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=coupons-service

          kubectl rollout status deployment/api-gateway -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=api-gateway

          kubectl rollout status deployment/frontend -n g10 --timeout=5m
          kubectl get pods -n g10 -l app=frontend

          kubectl get ingress -n g10
          
      - name: Show deployment status
        run: |
          echo "Deployment status:"
          kubectl get pods -n g10
          kubectl get svc -n g10
      
      - name: Cleanup credentials
        if: always()
        run: |
          rm -f /tmp/gcp-key.json

      - name: Final preventive-cleanup
        run: |
          echo "Starting final preventive cleanup of Docker resources..."
          sudo docker system prune -a -f --volumes
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo journalctl --vacuum-time=3d
          echo "Final preventive cleanup completed."